server:
  port: 8083

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

spring:
  profiles:
    active: dev
  config:
    import: optional:classpath:application-local.yml

  application:
    name: ticketbox

  datasource:
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}/${DB_NAME:XEPDB1}
    username: ${DB_USERNAME:ticketbox}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      # [DEV ONLY] Đổi sang validate khi deploy production (xem application-prod.yml)
      ddl-auto: update
    show-sql: true  # [DEV ONLY] Tắt trong production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${MAIL_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment/vnpay-return}
    payment-expiration-minutes: 15
    refund-api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

  mail:
    from: ${MAIL_FROM:onboarding@resend.dev}
    from-name: "Ticketbox"
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
    admin-email: ${ADMIN_EMAIL:}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  rate-limit:
    authenticated-limit: 300
    anonymous-limit: 60
    sensitive-limit: 10
    window-minutes: 1
    sensitive-paths:
      - /v1/auth/login
      - /v1/auth/register
      - /v1/auth/forgot-password
      - /v1/auth/reset-password

  upload:
    max-file-size-mb: 5

  auth:
    password-reset-ttl-minutes: 15

  seat:
    reservation-ttl-seconds: 600

  reminder:
    cron: "0 0 */23 * * *"
    window-start-hours: 23
    window-end-hours: 25

  order:
    cancellation-deadline-hours: 24

  refund:
    deadline-hours: 24

  dashboard:
    recent-orders-size: 10
    top-events-size: 5
