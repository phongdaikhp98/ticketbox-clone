server:
  port: 8083

spring:
  config:
    import: optional:classpath:application-local.yml

  application:
    name: ticketbox

  datasource:
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}/${DB_NAME:XEPDB1}
    username: ${DB_USERNAME:ticketbox}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${MAIL_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment/vnpay-return}

  mail:
    from: ${MAIL_FROM:onboarding@resend.dev}
    from-name: "Ticketbox"
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
