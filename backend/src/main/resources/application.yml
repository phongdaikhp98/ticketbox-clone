server:
  port: 8080

spring:
  application:
    name: ticketbox

  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: ticketbox
    password: ticketbox
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: your-secret-key-here-change-in-production-must-be-at-least-256-bits
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
